<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centennial — Coming Soon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Spectral+SC:wght@500&display=swap');

  :root {
    --bg: #0c0a10;
    --hairline: #2c2733;
    --gold: #d8b369;
    --gold-dim: #8a7245;
    --shadow-violet: #7a4fb5;
    --ink: #e9e2d4;
    --ink-dim: #a89e8e;
    --ink-faint: #6e6557;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: 'Spectral', serif;
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #1c1624 0%, var(--bg) 55%);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    text-align: center;
  }
  .wrap { padding: 40px 24px; max-width: 560px; }
  .eyebrow {
    font-family: 'Spectral SC', serif;
    letter-spacing: 0.35em;
    font-size: 11px;
    color: var(--shadow-violet);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 0.06em;
    background: linear-gradient(180deg, #f3e3b8 0%, var(--gold) 45%, #9d7e3e 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0;
  }
  .era { font-style: italic; color: var(--ink-dim); font-size: 15px; margin-top: 10px; }
  .divider {
    display: flex; align-items: center; gap: 14px;
    max-width: 240px; margin: 24px auto;
  }
  .divider span { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--hairline)); }
  .divider span.r { background: linear-gradient(to left, transparent, var(--hairline)); }
  .divider svg { width: 12px; height: 12px; color: var(--gold-dim); flex-shrink: 0; }
  .status {
    font-family: 'Spectral SC', serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 6px;
  }
  a.back {
    display: inline-block;
    margin-top: 36px;
    font-size: 13px;
    color: var(--gold-dim);
    text-decoration: none;
    letter-spacing: 0.04em;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, color 0.2s;
  }
  a.back:hover { color: var(--gold); border-color: var(--gold-dim); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">After Valkorath</div>
    <h1>Centennial</h1>
    <div class="divider">
      <span></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
      <span class="r"></span>
    </div>
    <div class="status">Coming soon</div>
    <a class="back" href="../">← Back to the universe</a>
  </div>
</body>
</html>
